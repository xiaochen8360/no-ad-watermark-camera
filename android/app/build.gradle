plugins {
    id "com.android.application"
}

android {
    namespace "com.devworkbench.watermark"
    compileSdk 35

    defaultConfig {
        applicationId "com.devworkbench.watermark"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    signingConfigs {
        debug {
            storeFile file("../debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    sourceSets {
        main {
            manifest.srcFile "../AndroidManifest.xml"
            java.srcDirs = ["../src"]
            res.srcDirs = ["../res"]
            assets.srcDirs = ["../../app"]
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
